services:
  bac-anchor:
    build:
      context: ..
      dockerfile: server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      BAC_ANCHOR_ENV: development
      BAC_ANCHOR_DB_URL: sqlite:////data/bac-anchor.sqlite3
    volumes:
      - bac-anchor-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  bac-anchor-data:
